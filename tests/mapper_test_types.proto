syntax = "proto3";

package test;

import "google/protobuf/timestamp.proto";

message AllTypes {
  int32  f_int32     = 1;
  int64  f_int64     = 2;
  uint32 f_uint32    = 3;
  uint64 f_uint64    = 4;
  float  f_float     = 5;
  double f_double    = 6;
  bool   f_bool      = 7;
  string f_string    = 8;
  bytes  f_bytes     = 9;
  google.protobuf.Timestamp f_timestamp = 10;
  repeated int32 f_repeated_int32 = 11;
}
